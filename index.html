<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Frame Maker</title>
    <script>
        (() => {
            const assetVersion = '20260406-231500';
            const localFontHref = `css/fonts-local.css?v=${assetVersion}`;
            const cdnFontHrefs = [
                'https://cdn.jsdelivr.net/npm/misans@4.1.0/lib/Normal/MiSans-Light.min.css',
                'https://cdn.jsdelivr.net/npm/misans@4.1.0/lib/Normal/MiSans-Regular.min.css',
            ];
            const isLocalHost = ['localhost', '127.0.0.1', '[::1]'].includes(window.location.hostname)
                || window.location.protocol === 'file:';

            const appendStylesheet = (href) => {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = href;
                document.head.appendChild(link);
                return link;
            };

            if (isLocalHost) {
                appendStylesheet(localFontHref);
                return;
            }

            let localFallbackLoaded = false;
            const loadLocalFallback = () => {
                if (localFallbackLoaded) return;
                localFallbackLoaded = true;
                appendStylesheet(localFontHref);
            };

            cdnFontHrefs.forEach((href) => {
                const link = appendStylesheet(href);
                link.addEventListener('error', loadLocalFallback, { once: true });
            });
        })();
    </script>
    <link rel="stylesheet" href="css/style.css?v=20260406-231500">
</head>

<body>
    <!-- 顶部工具栏 -->
    <header class="toolbar">
        <h1 class="toolbar-title">Frame Maker</h1>
        <div class="toolbar-actions">
            <button class="btn btn-secondary" id="btn-upload">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                上传照片
            </button>
            <div class="export-controls">
                <div class="export-field export-size-field">
                    <select id="export-size-preset">
                        <option value="original">原始尺寸</option>
                        <option value="1080">长边 1080px</option>
                        <option value="2048">长边 2048px</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
                <div class="export-custom-size hidden" id="export-custom-size">
                    <input type="number" id="export-width" min="1" step="1" inputmode="numeric" placeholder="宽度">
                    <span class="export-size-separator">×</span>
                    <input type="number" id="export-height" min="1" step="1" inputmode="numeric" placeholder="高度">
                </div>
                <div class="export-field export-quality-field">
                    <label for="export-quality">JPEG 质量</label>
                    <div class="export-quality-control">
                        <input type="range" id="export-quality" min="0.1" max="1" step="0.01" value="1">
                        <span class="export-quality-value" id="export-quality-value">100%</span>
                    </div>
                </div>
                <button class="btn btn-primary" id="btn-export">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    导出 JPG
                </button>
            </div>
        </div>
    </header>

    <!-- 主体区域 -->
    <main class="main-content">
        <!-- 左侧相框选择器 -->
        <section class="frame-selector" id="frame-selector">
            <h2 class="selector-title">相框选择器</h2>
            <div class="selector-list" id="selector-list">
                <!-- 由 JS 动态生成模板卡片 -->
            </div>
        </section>

        <div class="workspace-column">
            <!-- 预览区 -->
            <section class="preview-area" id="preview-area">
                <div class="upload-guide" id="upload-guide">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <p>拖拽上传照片</p>
                    <p class="upload-hint">支持 JPG / PNG / WebP 格式</p>
                </div>
                <canvas id="preview-canvas"></canvas>
            </section>
        </div>

        <!-- 右侧设置区 -->
        <aside class="text-editor" id="text-editor">
            <!-- 由 JS 动态生成输入字段 -->
        </aside>
    </main>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="file-input" accept="image/*" hidden>

    <script type="module" src="js/app.js?v=20260406-231500"></script>
</body>

</html>
