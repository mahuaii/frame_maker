<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame Maker Reference UI · Annotation Controls</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body data-type-mode="sans">
    <div class="page-shell">
        <header class="masthead">
            <div class="masthead-copy">
                <p class="eyebrow">Sample 03</p>
                <h1>展签注记控件</h1>
                <p class="lede">把参数组织成展签和摄影注记的层级，更适合偏编辑、偏叙事的模板方向。</p>
            </div>
            <div class="masthead-actions">
                <a class="button ghost" href="./gallery.html">返回目录</a>
            </div>
        </header>
        <main class="single-page-flow">
            <section class="study-panel sample-panel">
                <div class="study-header">
                    <p class="eyebrow">Annotation Ladder</p>
                    <h4>信息梯度组织</h4>
                </div>
                <div class="capsule-row">
                    <span class="capsule">EXIF</span>
                    <span class="capsule">Caption</span>
                    <span class="capsule">Story</span>
                </div>
                <div class="meta-ladder">
                    <div>
                        <strong>Title</strong>
                        <span>主标题占最大层级，作为照片叙事的唯一入口。</span>
                    </div>
                    <div>
                        <strong>Camera</strong>
                        <span>机型、焦段、快门、ISO 退到第二层，只保留摄影感。</span>
                    </div>
                    <div>
                        <strong>Export</strong>
                        <span>导出放在最底层，作为编辑链路终点，而非界面主角。</span>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
