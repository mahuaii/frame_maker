<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame Maker Reference UI · Glass Controls</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body data-type-mode="sans">
    <div class="page-shell">
        <header class="masthead">
            <div class="masthead-copy">
                <p class="eyebrow">Sample 04</p>
                <h1>微量毛玻璃控件</h1>
                <p class="lede">只在悬浮操作和快速切换上引入一点空气感，避免整页玻璃化造成轻浮。</p>
            </div>
            <div class="masthead-actions">
                <a class="button ghost" href="./gallery.html">返回目录</a>
            </div>
        </header>
        <main class="single-page-flow">
            <section class="study-panel glass-study sample-panel">
                <div class="study-header">
                    <p class="eyebrow">Glass Ribbon</p>
                    <h4>悬浮控制带</h4>
                </div>
                <div class="glass-ribbon">
                    <span>Title</span>
                    <span>Typeface</span>
                    <span>Margins</span>
                    <span>White</span>
                    <span>Export</span>
                </div>
                <div class="divider-stack">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <p class="study-text">适合放在预览图上方或右上角，作为快捷操作层，而不是常驻主表单。</p>
            </section>
        </main>
    </div>

</html>
