<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame Maker Reference UI · Hairline Controls</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body data-type-mode="sans">
    <div class="page-shell">
        <header class="masthead">
            <div class="masthead-copy">
                <p class="eyebrow">Sample 02</p>
                <h1>发丝线控件</h1>
                <p class="lede">强调更细、更轻的边界，让工具像展厅中的技术标签而不是沉重的软件面板。</p>
            </div>
            <div class="masthead-actions">
                <a class="button ghost" href="./gallery.html">返回目录</a>
            </div>
        </header>
        <main class="single-page-flow">
            <section class="study-panel sample-panel">
                <div class="study-header">
                    <p class="eyebrow">Hairline Toolbar</p>
                    <h4>工具条与输入组</h4>
                </div>
                <div class="tool-ribbon hairline">
                    <button>上传</button>
                    <button>适配</button>
                    <button>文字</button>
                    <button>色板</button>
                    <button class="is-strong">导出</button>
                </div>
                <div class="study-fields">
                    <label class="field minimal">
                        <span>作品标题</span>
                        <input type="text" value="Light Across the Wall">
                    </label>
                    <label class="field minimal">
                        <span>作品说明</span>
                        <input type="text" value="边界被尽量消隐，只剩精细的线与秩序。">
                    </label>
                    <label class="field minimal">
                        <span>尺寸方案</span>
                        <select>
                            <option>Original</option>
                            <option>1080 Long Edge</option>
                            <option>2048 Long Edge</option>
                        </select>
                    </label>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
